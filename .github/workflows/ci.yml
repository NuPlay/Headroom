name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (macOS) and compile (iOS Simulator)
    runs-on: macos-15
    env:
      TOOLCHAINS: com.apple.dt.toolchain.XcodeDefault
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 26
        run: |
          set -euo pipefail
          if [ -d /Applications/Xcode_26.3.app ]; then
            XCODE_APP=/Applications/Xcode_26.3.app
          elif [ -d /Applications/Xcode_26.2.app ]; then
            XCODE_APP=/Applications/Xcode_26.2.app
          elif [ -d /Applications/Xcode_26.1.1.app ]; then
            XCODE_APP=/Applications/Xcode_26.1.1.app
          elif [ -d /Applications/Xcode_26.0.1.app ]; then
            XCODE_APP=/Applications/Xcode_26.0.1.app
          elif xcodebuild -version | grep -q '^Xcode 26'; then
            XCODE_APP="$(dirname "$(dirname "$(xcode-select -p)")")"
          else
            echo "Xcode 26 is required for this CI job." >&2
            exit 1
          fi

          echo "DEVELOPER_DIR=${XCODE_APP}/Contents/Developer" >> "${GITHUB_ENV}"
          sudo xcode-select -s "${XCODE_APP}/Contents/Developer"
          xcodebuild -version
          xcrun swift --version
          echo "TOOLCHAINS=${TOOLCHAINS}"

      - name: Run macOS tests
        run: xcrun swift test

      - name: Compile iOS test bundle
        run: |
          set -euo pipefail
          xcodebuild build-for-testing \
            -scheme Headroom \
            -destination 'generic/platform=iOS Simulator' \
            -toolchain com.apple.dt.toolchain.XcodeDefault \
            CODE_SIGNING_ALLOWED=NO

      - name: Build with strict concurrency
        run: |
          set -euo pipefail
          xcodebuild build \
            -scheme Headroom \
            -destination 'generic/platform=iOS Simulator' \
            -toolchain com.apple.dt.toolchain.XcodeDefault \
            OTHER_SWIFT_FLAGS='-strict-concurrency=complete' \
            CODE_SIGNING_ALLOWED=NO
